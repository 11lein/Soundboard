<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; media-src 'self' file:;"
    />
    <title>MP3 Sorter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="toolbar">
        <button id="open-btn">📂 Ordner öffnen</button>
        <span id="folder-path" class="muted">Kein Ordner geladen</span>
      </div>
      <div class="toolbar">
        <span id="status" class="muted"></span>
        <button id="rename-btn" disabled>✏️ Umbenennen</button>
        <button id="list-btn" disabled>📋 Liste</button>
        <button id="sd-btn" disabled>💳 Auf SD-Karte</button>
        <button id="preview-btn" disabled>👁️ Vorschau</button>
        <button id="pdf-btn" disabled>🖨️ PDF</button>
        <button id="save-draft-btn" disabled>💾 Zwischenspeichern</button>
        <button id="commit-btn" class="primary" disabled>✅ Final speichern</button>
      </div>
    </header>

    <main id="drop-zone">
      <div id="empty-hint" class="empty-hint">
        <p>📂 Ordner öffnen oder MP3-Dateien hierher ziehen</p>
        <p class="muted">
          6 Bänke × 24 Tasten als 5×5-Raster (jede Taste = 6 Bänke untereinander).
          Dateien mit gültigem <code>0101_</code>-Prefix landen auf ihrem Platz,
          alle anderen unten in den Parkplätzen (alphabetisch).
        </p>
      </div>
      <div id="grid-wrap"></div>
      <div id="parking-wrap"></div>
      <div id="trash-wrap"></div>
    </main>

    <!-- Renamer dialog -->
    <div id="rename-dialog" class="overlay hidden">
      <div class="dialog wide">
        <h3>Dateien umbenennen (Suchen &amp; Ersetzen)</h3>
        <div class="rename-fields">
          <label>Suchen <input type="text" id="rn-search" /></label>
          <label>Ersetzen <input type="text" id="rn-replace" /></label>
          <label class="cb"><input type="checkbox" id="rn-regex" /> Regex</label>
          <label class="cb"><input type="checkbox" id="rn-case" /> Groß/Klein beachten</label>
        </div>
        <div id="rn-error" class="rn-error"></div>
        <div class="rn-preview-head">
          <span id="rn-count" class="muted"></span>
        </div>
        <div id="rn-preview" class="rn-preview"></div>
        <div class="dialog-buttons">
          <button id="rn-cancel" class="link">Abbrechen</button>
          <button id="rn-apply" class="primary" disabled>Übernehmen</button>
        </div>
      </div>
    </div>

    <script src="../lib/naming.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
